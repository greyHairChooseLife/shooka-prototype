services:
    app:
        image: shooka-prototype
        restart: unless-stopped
        env_file: .env
        volumes:
            - app-data:/data
        networks:
            - internal

    caddy:
        image: caddy:2-alpine
        restart: unless-stopped
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - caddy-data:/data
            - caddy-config:/config
        depends_on:
            - app
        networks:
            - internal

volumes:
    app-data:
    caddy-data:
    caddy-config:

networks:
    internal:
